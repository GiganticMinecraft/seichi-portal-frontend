name: Setup
description: Checkout 後に Node.js (mise) と pnpm をセットアップし、依存をインストールする共通ステップ
runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: jdx/mise-action@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v6
      with:
        cache: true

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
