name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Build-time validation needs these public MSAL values even in CI.
      # Dummy values are enough because this workflow only verifies lint/format/build.
      NEXT_PUBLIC_MS_APP_CLIENT_ID: 00000000-0000-0000-0000-000000000000
      NEXT_PUBLIC_MS_APP_REDIRECT_URL: http://localhost:3000
      NEXT_PUBLIC_DEBUG_MODE: 'false'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: jdx/mise-action@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run lint

      - name: Format
        run: pnpm run fmt

      - name: Build
        run: pnpm run build
