name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Build-time validation needs these public MSAL values even in CI.
      # Dummy values are enough because this workflow only verifies lint/format/build.
      NEXT_PUBLIC_MS_APP_CLIENT_ID: 00000000-0000-0000-0000-000000000000
      NEXT_PUBLIC_MS_APP_REDIRECT_URL: http://localhost:3000
      NEXT_PUBLIC_DEBUG_MODE: 'false'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: jdx/mise-action@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Lint
        run: pnpm run lint

      - name: Format
        run: pnpm run fmt

      - name: Unit test
        run: pnpm run test:unit

      - name: E2E test
        run: pnpm run test:e2e

      - name: Build
        run: pnpm run build
