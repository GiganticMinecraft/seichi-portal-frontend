pre-commit:
  parallel: false
  jobs:
    - name: lint
      glob: '*.{js,jsx,ts,tsx,mjs,cjs}'
      run: pnpm lint -- {staged_files}

    - name: type-check
      run: pnpm type-check

    - name: fmt
      run: pnpm fmt

pre-push:
  parallel: false
  jobs:
    - name: unit-test
      run: pnpm test:unit
